# Configuracao do servico Backend (SIGMA) no Railway.
# Root Directory do servico deve ser a raiz do repositorio (nao frontend/).

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "npm start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[env]
NODE_ENV = "production"
INITIAL_ADMIN_PASSWORD = "Gestop@123"
SYNC_REPLAY_INTERVAL_MS = "1800000"
# Referenciavel pelo frontend: ${{gestop.BACKEND_LISTEN_PORT}}
BACKEND_LISTEN_PORT = "8080"
