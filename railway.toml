# Configuracao do servico Backend (SIGMA) no Railway.
# Root Directory do servico deve ser a raiz do repositorio (nao frontend/).
#
# STORAGE (obrigatorio para fotos persistentes):
# 1. Volumes → Add Volume → mount path: /data
# 2. Variables (nao commitar senhas aqui):
#    STORAGE_DRIVER=local
#    STORAGE_LOCAL_DIR=/data/gestop-evidencias
#    STORAGE_PUBLIC_URL_BASE=https://gestop.up.railway.app/api-gestop
#    INITIAL_ADMIN_PASSWORD=<senha-forte>  (somente via Railway Variables)

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "npm start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[env]
NODE_ENV = "production"
SYNC_REPLAY_INTERVAL_MS = "1800000"
STORAGE_DRIVER = "local"
# Referenciavel pelo frontend: ${{gestop.PORT}} (porta injetada pelo Railway)
BACKEND_LISTEN_PORT = "8080"
