# Servico Frontend (Next.js) — Root Directory = frontend/
# O proxy /api-gestop usa BACKEND_INTERNAL_URL para falar com o NestJS na rede privada.
# Use ${{gestop.PORT}} (porta real do container), nao BACKEND_LISTEN_PORT.

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "npm start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[env]
NODE_ENV = "production"
# Servico backend no Railway deve se chamar "gestop"
BACKEND_INTERNAL_URL = "http://${{gestop.RAILWAY_PRIVATE_DOMAIN}}:${{gestop.PORT}}"
